<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pasos Seguros — Prototipo · Profamilia</title>
  <meta name="description" content="Prototipo de diseño: PWA informativa, anónima, multilingüe y offline para personas migrantes en tránsito. Profamilia y aliados." />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#154734" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pasos Seguros" />
  <link rel="icon" href="icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="stage">
    <!-- ============ PANEL DE PRESENTACIÓN (escritorio) ============ -->
    <aside class="pitch">
      <div class="pitch__brandrow">
        <img src="assets/img/logo-mark.svg" alt="Pasos Seguros" />
        <span>
          <b>Pasos Seguros</b>
          <span class="pitch__client">Prototipo de diseño · Profamilia y aliados</span>
        </span>
      </div>

      <!-- Explicación contextual de la pantalla actual (se actualiza al navegar) -->
      <div class="explain" id="explain"></div>

      <div class="pitch__tools">
        <button class="btn-ghost-light" onclick="PS.toggleOfflineSim()">
          <span class="ic" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1l22 22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.8a15 15 0 0 1 5-3"/><path d="M22 8.8a15 15 0 0 0-9-3.6"/></svg></span>
          Simular sin conexión
        </button>
        <button class="btn-ghost-light" onclick="PS.resetDemo()">
          <span class="ic" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></span>
          Reiniciar demo
        </button>
      </div>

      <p class="pitch__note">
        <b>Demo de solo front y diseño.</b> Datos de ejemplo, no reales. Lo que ves simula la
        experiencia final de la fase 1–2 de la propuesta. Ábrelo en un celular para instalarlo
        como app y probar el modo sin conexión.
      </p>
    </aside>

    <!-- ============ TELÉFONO ============ -->
    <div class="device-wrap">
      <div class="device">
        <div class="device__notch" aria-hidden="true"></div>
        <div class="device__screen">
          <div class="statusbar" id="statusbar">
            <span id="sb-time">9:41</span>
            <span class="statusbar__icons" aria-hidden="true">
              <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
              <svg id="sb-wifi" width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.5 0.8 4.2a10 10 0 0 1 14.4 0L8 11.5Z"/></svg>
              <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="1" width="20" height="10" rx="3"/><rect x="3" y="3" width="14" height="6" rx="1.5" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx=".75" fill="currentColor"/></svg>
            </span>
          </div>
          <div class="netbanner" id="netbanner" role="status"></div>
          <div class="app" id="app"></div>
          <div class="toast" id="toast" role="status" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
